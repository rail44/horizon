# Horizon configuration (example / template).
#
# Location: Horizon reads exactly one config file, from exactly one place —
# there is no layered system/user/project merge.
#
#     $XDG_CONFIG_HOME/horizon/config.toml
#     (falls back to ~/.config/horizon/config.toml if XDG_CONFIG_HOME is unset)
#
# Copy this file there to start customizing Horizon, or point HORIZON_CONFIG
# at a file anywhere else (mainly useful for testing, or for running more
# than one Horizon configuration side by side):
#
#     HORIZON_CONFIG=/path/to/my-config.toml horizon
#
# Precedence: environment variable > this file > built-in default. Existing
# env vars (HORIZON_RIG_MODEL, OPENAI_API_KEY, OPENAI_BASE_URL, ...) keep
# winning over whatever is set below.
#
# Applied at startup only — restart Horizon after editing this file. Nothing
# here is watched for live changes.
#
# Secrets never go here. OPENAI_API_KEY (and any future provider secret) is
# environment-only; there is no field for it anywhere in this file.
#
# Philosophy: this file exists for values that are still being tuned. A
# value that proves stable over time is a candidate to graduate into a
# plain built-in default in a later Horizon version — don't assume every
# knob below stays configurable forever.
#
# An invalid entry in [keybindings] or [theme] is warned about on stderr and
# skipped — it never crashes startup. The same is true of this whole file:
# if it fails to parse, Horizon logs a warning and falls back to built-in
# defaults everywhere.

# ---------------------------------------------------------------------------
# [agent] — tuning for the agent's bash/fs tools and turn-loop guards.
#
# These are active (uncommented) below because they're the current
# production defaults, shown here as a live, editable reference — not
# because you need to set them. Delete a line (or the whole section) to
# fall back to the same built-in default.
# ---------------------------------------------------------------------------
[agent]
# Wall-clock timeout applied to a `bash` call when it doesn't pass its own
# `timeout_secs`, in seconds.
bash_timeout_default_secs = 120
# Hard cap on the `timeout_secs` a `bash` call may request, in seconds.
bash_timeout_max_secs = 600
# How much of a `bash` call's combined stdout+stderr is kept in-context
# (head+tail, with the middle elided); the full output is always spilled to
# a temp file regardless. In characters, not bytes.
bash_output_cap_chars = 30000
# How long, after a `bash` child process exits, Horizon keeps waiting for
# its output pipes to hit EOF before giving up — covers a command that
# backgrounds a process holding the pipe open (`some-server &`). In seconds.
bash_drain_grace_secs = 2

# Default number of lines `fs.read` returns when a call doesn't pass its own
# `limit`.
fs_read_line_cap = 2000
# Maximum total bytes of file content a single `fs.grep` traversal will read
# before stopping early, independent of match count.
fs_grep_max_bytes = 67108864
# Maximum number of files a single `fs.glob`/`fs.grep` traversal will visit
# before stopping early, independent of match count.
fs_traversal_max_files = 20000
# Default number of matches `fs.grep`/`fs.glob` *return* when a call doesn't
# pass its own `limit` — distinct from the traversal caps above, which
# bound how much of the tree gets scanned, not how many of the matches
# found get returned.
fs_grep_result_limit = 100
fs_glob_result_limit = 200

# Consecutive tool-driven turns (since the last user message) the agent may
# run before Horizon halts it as a likely runaway loop.
iteration_cap = 25
# Consecutive identical (tool, args, output) fingerprints that trip the
# doom-loop guard.
doom_loop_window = 3

# Token budget for the conversation history sent to the provider on each
# turn: once the accumulated history would exceed this many (heuristically
# counted) tokens, the oldest messages are dropped from the outgoing
# request while the full history stays intact in the DuckDB projection --
# this only shapes the view sent to the provider, never what's persisted.
# 60000 is conservative on purpose: token counts come from a
# provider-agnostic byte-length heuristic, not the provider's real
# tokenizer, and can be off by up to ~30% on real content, so the budget
# leaves headroom for that plus the system prompt and tool responses.
history_token_budget = 60000

# Character cap on the "Repository instructions" section appended to the
# system prompt from AGENTS.md/CLAUDE.md files found while walking from the
# session's working directory up to the repository root (AGENTS.md wins at
# each directory level; CLAUDE.md is a fallback for a level with only that).
# 24000 is roughly 4x this repository's own AGENTS.md, generous for a normal
# repo while still leaving most of history_token_budget's headroom free.
repository_instructions_cap_chars = 24000

# How often, in milliseconds, streamed assistant-text/reasoning deltas and
# tool-call-argument progress are coalesced into an emitted event.
stream_flush_interval_ms = 100
# Character count that forces an early flush of a streamed delta, ahead of
# the time-based flush above.
stream_flush_chars = 320

# Overrides the append-only agent event log (JSONL) path. Commented out:
# the real default is $XDG_DATA_HOME/horizon/agent-events.jsonl, falling
# back to ~/.local/share/horizon/agent-events.jsonl if XDG_DATA_HOME is
# unset -- computed at startup, not a single literal value worth
# hardcoding here as "live". `HORIZON_AGENT_EVENT_LOG`, if set, wins over
# this. A leading "~/" (here or in the env var) is expanded against $HOME.
# event_log_path = "~/.local/share/horizon/agent-events.jsonl"
# Overrides the DuckDB projection database path used to replay per-session
# rig history. Commented out: the real default is
# $XDG_DATA_HOME/horizon/agent-state.duckdb, falling back to
# ~/.local/share/horizon/agent-state.duckdb if XDG_DATA_HOME is unset --
# computed at startup, not a single literal value worth hardcoding here as
# "live". The projection always runs (it's a rebuildable, non-authoritative
# derived view of the JSONL log, not persisted state of its own); this only
# relocates the file. `HORIZON_AGENT_STATE_DB`, if set, wins over this. Same
# "~/" expansion as event_log_path above.
# state_db_path = "~/.local/share/horizon/agent-state.duckdb"

# ---------------------------------------------------------------------------
# [provider] — the built-in rig/OpenAI provider's model and base URL.
#
# Commented out below: both fall back to a built-in default (or, for
# base_url, to rig's own default endpoint) when unset here. `HORIZON_RIG_MODEL`
# and `OPENAI_BASE_URL` env vars, if set, win over whatever is set here.
# Never put an API key in this file — see the header above.
# ---------------------------------------------------------------------------
[provider]
# model = "gpt-4o-mini"
# base_url = "https://api.openai.com/v1"
# Sampling temperature and max output tokens passed to the completion
# request. Commented out: unset means "don't send the field at all", letting
# the provider apply its own default.
# temperature = 0.7
# max_tokens = 4096

# ---------------------------------------------------------------------------
# [terminal] — cell rendering metrics, scrollback, the spawned shell, and
# the `TERM` identity presented to it.
#
# `shell`/`shell_args` are commented out below: the real default for `shell`
# is "whatever the `SHELL` env var says" (falling back to `/bin/sh` if even
# that is unset), not a value worth documenting as "live" — and `SHELL`, if
# set, keeps winning over `shell` here either way. `shell_args` defaults to
# no extra arguments.
# ---------------------------------------------------------------------------
[terminal]
# Font size (px) used to measure terminal cell width and lay out terminal
# text.
font_size = 13.0
# Line height (px) for the same text.
line_height = 18.0
# Maximum scrollback lines kept per terminal session.
scrollback_lines = 10000
# The `TERM` value presented to the spawned shell.
term = "xterm-kitty"
# Overrides the spawned shell program when `SHELL` is unset.
# shell = "/bin/zsh"
# Extra argv entries passed to the spawned shell (e.g. a login shell).
# shell_args = ["-l"]

# ---------------------------------------------------------------------------
# [ui] — cross-domain UI: the app-wide font family (shared by the terminal,
# agent transcript, and workspace agent controls) and the window's initial
# size.
# ---------------------------------------------------------------------------
[ui]
# Comma-separated font stack: the first entry is the primary family, the
# rest are fallbacks tried in glyph order (e.g. CJK falling through to the
# primary monospace font). Entries are matched by exact family name, the
# same way `fc-list` reports them -- fontconfig generic aliases like
# "monospace" are not resolved the way `fc-match` resolves them and will
# simply be skipped if no installed font is literally named that.
font_family = "Iosevka Nerd Font Mono, Symbols Nerd Font Mono, Noto Sans Mono CJK JP, monospace, Noto Sans CJK JP"
window_width = 1100.0
window_height = 720.0

# ---------------------------------------------------------------------------
# [keybindings] — key chord string -> command id, layered on top of
# Horizon's built-in default bindings (overriding a default bound to the
# same chord, or adding a new one).
#
# Chord syntax: modifiers joined with `+`, ending in the key itself —
# `ctrl`/`control`, `shift`, `alt`/`option`, `meta`/`cmd`/`command`/`super`/
# `win`, then a single character (`t`, `1`, ...) or a named key (`enter`,
# `escape`, `tab`, `space`, `backspace`, `delete`, `up`/`arrowup`, `down`,
# `left`, `right`, `home`, `end`, `pageup`, `pagedown`). Case-insensitive.
#
# Command ids (see `src/app/commands.rs`'s `CommandId`): split-right (opens
# the palette's view chooser to split the active pane horizontally),
# split-down (same chooser, but vertically), new-tab (opens the chooser to
# open a new tab), focus-next-pane, close-active-pane,
# close-active-tab, terminate-active-session, approve-tool-call,
# deny-tool-call, cancel-agent-turn, reload-session-runtime, reload-config,
# manage-sessions (opens the session manager modal). The reserved pseudo-command
# `open-palette` is also accepted here — it isn't a real `CommandId` (opening
# the palette isn't an operation the palette itself can list or run), and
# overrides the chord that opens the command palette. Unbound by default:
# the palette is a workspace-mode resident (`:` inside the mode, see below)
# rather than a global shortcut, so this only matters if you want one back.
#
# Likewise, the reserved pseudo-command `workspace-mode` overrides the
# chord that enters workspace mode (`ctrl+'` by default -- see
# `docs/workspace-mode-design.md`). An agent pane's message box also
# accepts a bare `Esc` as a second entry path regardless of this setting,
# since (unlike a terminal) it has no protocol-level claim on that key.
#
# An unparsable chord or an unrecognized command id is warned about on
# stderr and skipped — never a startup failure.
# ---------------------------------------------------------------------------
[keybindings]
# "ctrl+shift+t" = "new-tab"
# "ctrl+shift+p" = "open-palette"
# "ctrl+'" = "workspace-mode"
# "ctrl+." = "cancel-agent-turn"

# ---------------------------------------------------------------------------
# [theme] — the app's one color scheme. Since 2026-07-16
# (docs/theme-design.md's "config surface narrowed to the seed" decision)
# this section is EXACTLY the seed: three keys here plus the six normal
# [theme.ansi] hue slots below. Every other role -- text colors, semantic
# colors, surfaces, borders, diff colors, the terminal's own
# foreground/background/cursor, the ANSI black/white/bright_* slots -- is
# derived from the seed; none of them are independently settable any more.
# If you don't like a derived value, tune the seed (or the derivation
# itself, in `src/theme.rs`) rather than looking for a per-role override --
# that escape hatch is gone by design (an interactive settings view is the
# planned way to explore this without editing files by hand).
#
#   surface_base — the seed's anchor, a hex color. Its own lightness
#     decides the scheme's polarity (dark vs. light) automatically; no
#     separate switch.
#   accent — the app's one focus/selection accent. Either a hex value OR
#     one of the six [theme.ansi] hue names below ("red"/"green"/"yellow"/
#     "blue"/"magenta"/"cyan") as a slot reference -- e.g. `accent = "blue"`
#     resolves to [theme.ansi]'s blue (after any override), and every
#     downstream accent derivation is identical either way.
#   text_contrast — the one continuous knob: the WCAG contrast ratio the
#     derived foreground text targets against surface_base. A number,
#     clamped to [4.5, 21.0]; defaults to 15 (the built-in dark scheme's
#     own measured ratio, so leaving this unset keeps today's look).
#     Unparsable values (including a non-numeric TOML type) fall back to
#     the default silently.
#
# Setting any of the ~20 role keys this section used to document directly
# (text_primary, text_muted, text_subtle, danger, warning, success, info,
# surface_panel, surface_raised, surface_chrome, surface_selected,
# border_default, border_subtle, diff_added_surface, diff_added_text,
# diff_removed_surface, diff_removed_text, terminal_foreground,
# terminal_background, terminal_cursor, cursor_accent) is warned about on
# stderr as no longer configurable and ignored -- same for any other
# unrecognized name or an unparsable hex value, which fall back to the
# built-in/derived default as before.
# ---------------------------------------------------------------------------
[theme]
# surface_base = "#f6f6f6"
# accent = "#84dcc6"
# accent = "blue"        # equivalent to [theme.ansi]'s blue, see above
# text_contrast = 15

# ---------------------------------------------------------------------------
# [theme.ansi] — the seed's hue set: the six normal ANSI colors
# (red/green/yellow/blue/magenta/cyan), as `#rrggbb`/`#rgb` hex strings.
# Used by the terminal verbatim (never auto-adjusted, even though the
# UI-side color derived from the same hue, e.g. `danger` from `red`, is
# contrast-snapped for readability) and doubles as the seed's own hue set
# above `[theme]`'s `text_contrast`/`surface_base` derive against.
#
# Active (uncommented) below because these are the current production
# defaults, shown here as a live, editable reference — not because you need
# to set them, matching [terminal] above. An unparsable hex value is warned
# about on stderr and skipped, leaving that one slot at its built-in
# default.
#
# black, white, and the eight bright_* slots are no longer independently
# configurable (2026-07-16, docs/theme-design.md) -- they derive from the
# seed too (`black`/`white` track the resolved background/foreground;
# `bright_black` tracks text_subtle; the six colored `bright_*` hues and
# `bright_white` are a fixed lightness push off their normal counterpart).
# Setting any of them here is warned about on stderr as no longer
# configurable and ignored.
# ---------------------------------------------------------------------------
[theme.ansi]
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
