[workspace]
members = [".", "crates/horizon-agent", "crates/horizon-agentd", "crates/horizon-control"]

[package]
name = "horizon"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
alacritty_terminal = "0.26.0"
crossbeam-channel = "0.5"
floem = { git = "https://github.com/lapce/floem", rev = "31fa8f444c37f4c314f47d88c23ffdbc25f2ab53", features = ["crossbeam"] }
floem_renderer = { git = "https://github.com/lapce/floem", rev = "31fa8f444c37f4c314f47d88c23ffdbc25f2ab53" }
horizon-agent = { path = "crates/horizon-agent" }
portable-pty = "0.9.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
termwiz = "0.23.3"
thiserror = "2.0"
tokio = { version = "1.52", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
toml = "0.8"
unicode-width = "0.2"
uuid = { version = "1.18", features = ["v4", "serde"] }
wasmtime = "46.0.1"

[lints.clippy]
all = { level = "warn", priority = -1 }
