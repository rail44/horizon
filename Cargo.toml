[workspace]
members = [
    ".",
    "crates/horizon-agent",
    "crates/horizon-sessiond",
    "crates/horizon-control",
    "crates/horizon-ctl",
    "crates/horizon-session-protocol",
    "crates/horizon-terminal-core",
    "crates/horizon-config",
    "crates/horizon-workspace",
]

[package]
name = "horizon"
version = "0.1.0"
edition = "2021"

[dependencies]
alacritty_terminal = "0.26.0"
anyhow = "1.0"
crossbeam-channel = "0.5"
futures = "0.3"
# gpui/gpui-component ride git HEAD by spec; the committed Cargo.lock is
# the actual pin (rev-pinning gpui in [dependencies] would split it from
# gpui-component's own unpinned gpui dep into two incompatible
# instances). Bump deliberately with `cargo update`.
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed", features = ["font-kit", "wayland"] }
gpui-component = { git = "https://github.com/longbridge/gpui-component" }
horizon-agent = { path = "crates/horizon-agent" }
horizon-config = { path = "crates/horizon-config" }
horizon-control = { path = "crates/horizon-control" }
horizon-ctl = { path = "crates/horizon-ctl" }
horizon-terminal-core = { path = "crates/horizon-terminal-core" }
horizon-workspace = { path = "crates/horizon-workspace" }
portable-pty = "0.9.0"
serde_json = "1.0"
sysinfo = { version = "0.39.6", default-features = false, features = ["system"] }
termwiz = "0.23.3"
tokio = { version = "1.52", features = ["rt", "net", "io-util", "time", "macros"] }
unicode-width = "0.2"
uuid = { version = "1.18", features = ["v4", "serde"] }

[lints.clippy]
all = { level = "warn", priority = -1 }
