[package]
name = "horizon"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
alacritty_terminal = "0.26.0"
crossbeam-channel = "0.5"
duckdb = { version = "1", features = ["bundled"] }
floem = "0.2.0"
floem_renderer = "0.2.0"
futures-util = "0.3"
globset = "0.4"
libc = "0.2"
portable-pty = "0.9.0"
regex = "1"
rig-core = "0.39.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
termwiz = "0.23.3"
thiserror = "2.0"
tokio = { version = "1.52", features = ["rt-multi-thread", "macros", "process", "time"] }
tokio-util = "0.7"
unicode-width = "0.2"
uuid = { version = "1.18", features = ["v4", "serde"] }
walkdir = "2"
wasmtime = "46.0.1"

[lints.clippy]
all = { level = "warn", priority = -1 }
